# Origin server config for verse-base.com — static Astro build served by nginx.
# Coolify runs this image behind Cloudflare: Cloudflare terminates TLS and forwards
# these response headers to the browser over HTTPS, so headers set here reach the
# client on the secure connection (that's why HSTS set at the origin is honoured).
#
# Replaces the stock nginx `default.conf`. Kept deliberately close to stock — the
# additions are the security-header block, a real 404 page and Cache-Control.

# --- Cache-Control nach Inhaltstyp -------------------------------------------
# Als map + `expires $var` statt Regex-Locations: eine location ~* \.html$ würde
# die /en/-Redirect-Prefixes und try_files aushebeln (Regex schlägt Prefix), und
# add_header in einer location verwirft die Security-Header des server-Blocks.
# `expires` hat beide Probleme nicht (eigene Direktive, Vererbung bleibt intakt).
#   - HTML: -1 = no-cache — Deploys tauschen Dateien unter fester URL, Browser
#     sollen revalidieren (nginx liefert ETag/Last-Modified; 304 ist billig).
#   - Bilder/Video/Fonts: ändern sich praktisch nie -> 30 Tage.
#   - CSS/JS/JSON unter fester URL (assets/*.js, *-db.json): 1 Tag — Deploy-
#     Änderungen sollen zeitnah ankommen; gehashte Dateien regelt der Block unten.
map $sent_http_content_type $vb_expires {
    default                    off;
    ~text/html                 -1;
    ~image/                    30d;
    ~video/                    30d;
    ~font/                     30d;
    ~text/css                  1d;
    ~application/javascript    1d;
    ~application/json          1d;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Redirects RELATIV ausliefern ("Location: /schiffe/x.html").
    # Sonst baut nginx eine ABSOLUTE URL aus $scheme://$host — und $scheme ist
    # hier immer "http", weil Cloudflare TLS terminiert und uns unverschlüsselt
    # anspricht. Ergebnis waeren 301s von https:// nach http:// (Extra-Hop ueber
    # den HTTPS-Redirect, Mixed-Content-Block bei fetch(), verschenkte
    # Link-Equity). Relative Locations sind laut RFC 7231 gueltig und loesen
    # beim Client gegen das aktuelle Schema auf.
    absolute_redirect off;

    # --- Security response headers ---------------------------------------------
    # Fixes Cloudflare Security Insights finding "Domains without HSTS".
    # HSTS: 1 year, includes subdomains (all *.verse-base.com run through Cloudflare
    # TLS, so they are HTTPS-capable). No `preload` on purpose — preload bakes the
    # domain into browsers' hardcoded HTTPS list and is very hard to undo; it should
    # be a separate, deliberate submission to hstspreload.org, not bundled here.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Zero-risk hardening that belongs with HSTS on a static content site:
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Cache-Control per Inhaltstyp (map oben). Gilt für alle Antworten dieses
    # server-Blocks; Cloudflare übernimmt Origin-Cache-Control fürs Edge.
    expires $vb_expires;

    # Astro-Bundles unter /_astro/ tragen einen Content-Hash im Dateinamen —
    # jede Änderung erzeugt eine NEUE URL, der Inhalt einer URL ist unveränderlich.
    # ^~ (Prefix, stoppt Regex-Suche) statt Regex: lässt /en/-Redirects und
    # try_files der anderen Pfade unangetastet. expires überschreibt die map.
    location ^~ /_astro/ {
        expires 1y;
    }

    # 3D-Holo-Meshes (.glb): nginx kennt den Typ nicht -> lieferte
    # application/octet-stream OHNE Cache-Header (jeder Besuch lud das Mesh neu).
    # `types` ERSETZT die geerbte MIME-Map komplett — darum nur in dieser
    # location gesetzt (hier liegen ausschliesslich .glb). Die Mesh-URLs tragen
    # einen Content-Hash als ?v= (aus holo-meshes.json) — der Inhalt einer URL
    # ist damit unveraenderlich, also 1 Jahr wie /_astro/.
    location ^~ /holo/ {
        types { model/gltf-binary glb; }
        expires 1y;
    }

    # --- Sprach-Tausch: Englisch ist Standard und liegt auf der Wurzel ----------
    # Vorher: DE präfixlos auf der Wurzel, EN unter /en/. Jetzt umgekehrt.
    # Die alten /en/…-URLs sind indexiert und dürfen nicht ins 404 laufen — sie
    # zeigen auf exakt dieselbe (englische) Seite, die jetzt auf der Wurzel liegt,
    # also permanent umleiten und das Ranking mitnehmen.
    #   /en.html            -> /
    #   /en/schiffe/x.html  -> /schiffe/x.html
    # Die alten DEUTSCHEN URLs (/schiffe/x.html) werden NICHT umgeleitet: dort
    # liegt jetzt die englische Seite. Das ist die bewusste Konsequenz des
    # Tauschs; hreflang/x-default verweisen von dort auf /de/….
    location = /en.html { return 301 /; }
    location = /en      { return 301 /; }
    location /en/ {
        rewrite ^/en/(.*)$ /$1 permanent;
    }

    # --- DE-Einstieg: /de bzw. /de/ ist die naheliegende Tipp-URL der deutschen
    # Sprach-Wurzel, die Startseite liegt aber als Datei /de.html (build.format
    # 'file'). /de/ ist nur der Ordner der Unterseiten und hat keinen Index —
    # try_files lief dort in ein nacktes 403. Beide Formen kanonisch umleiten.
    location = /de  { return 301 /de.html; }
    location = /de/ { return 301 /de.html; }

    # --- Konto-Einstieg: gleiche format:'file'-Mechanik wie /de — das Dashboard
    # liegt als /account.html bzw. /de/account.html, der /account/-Ordner trägt
    # nur die Unterseiten (login/register/…) und hat keinen Index.
    location = /account     { return 301 /account.html; }
    location = /account/    { return 301 /account.html; }
    location = /de/account  { return 301 /de/account.html; }
    location = /de/account/ { return 301 /de/account.html; }

    # --- Datenschicht-Verzeichnisse: /items und /crafting ----------------------
    # Gleiche format:'file'-Falle wie /de und /account: das Verzeichnis
    # /items/ traegt die 5.000 Datenblaetter, das Verzeichnis selbst hat aber
    # KEINE index.html — der Hub liegt als /items.html daneben. Ohne diese
    # Weiterleitungen liefe die naheliegende Tipp-URL /items in ein 403/404.
    location = /items         { return 301 /items.html; }
    location = /items/        { return 301 /items.html; }
    location = /de/items      { return 301 /de/items.html; }
    location = /de/items/     { return 301 /de/items.html; }
    location = /crafting      { return 301 /crafting.html; }
    location = /crafting/     { return 301 /crafting.html; }
    location = /de/crafting   { return 301 /de/crafting.html; }
    location = /de/crafting/  { return 301 /de/crafting.html; }

    # --- Oeffentliche Piloten-Profile: /pilot/<handle> -------------------------
    # Die Profilseite ist statisch (/pilot.html bzw. /de/pilot.html,
    # build.format 'file') und laedt das Profil CLIENTSEITIG aus den Supabase-
    # Views — SSR gibt es nicht. Trotzdem sollen teilbare, sprechende URLs wie
    # /pilot/star_runner funktionieren: interner Rewrite auf die statische
    # Datei, der Handle wandert in den Query-Parameter ?h= (die Seite liest ihn
    # von dort; Fallback: sie parst location.pathname selbst). `last` startet
    # die Location-Suche mit dem umgeschriebenen URI neu, damit die Datei ueber
    # den normalen location /-Block mit try_files ausgeliefert wird.
    # Handle-Alphabet deckt sich mit dem Dashboard-Regex (a-z 0-9 _, hier
    # grosszuegiger auch A-Z und Bindestrich).
    location /de/pilot/ { rewrite ^/de/pilot/([A-Za-z0-9_-]+)/?$ /de/pilot.html?h=$1 last; }
    location /pilot/    { rewrite ^/pilot/([A-Za-z0-9_-]+)/?$ /pilot.html?h=$1 last; }

    # Static multi-page site (Astro build.format:'file' → real .html files, plus
    # directory index.html for the onepagers). No SPA rewrite — mirror the existing
    # behaviour and fall through to a real 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Astro emits /404.html; serve it with a genuine 404 status (not 200).
    error_page 404 /404.html;
}
