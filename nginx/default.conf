# Origin server config for verse-base.com — static Astro build served by nginx.
# Coolify runs this image behind Cloudflare: Cloudflare terminates TLS and forwards
# these response headers to the browser over HTTPS, so headers set here reach the
# client on the secure connection (that's why HSTS set at the origin is honoured).
#
# Replaces the stock nginx `default.conf`. Kept deliberately close to stock — the
# only additions are the security-header block and a real 404 page.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Redirects RELATIV ausliefern ("Location: /schiffe/x.html").
    # Sonst baut nginx eine ABSOLUTE URL aus $scheme://$host — und $scheme ist
    # hier immer "http", weil Cloudflare TLS terminiert und uns unverschlüsselt
    # anspricht. Ergebnis waeren 301s von https:// nach http:// (Extra-Hop ueber
    # den HTTPS-Redirect, Mixed-Content-Block bei fetch(), verschenkte
    # Link-Equity). Relative Locations sind laut RFC 7231 gueltig und loesen
    # beim Client gegen das aktuelle Schema auf.
    absolute_redirect off;

    # --- Security response headers ---------------------------------------------
    # Fixes Cloudflare Security Insights finding "Domains without HSTS".
    # HSTS: 1 year, includes subdomains (all *.verse-base.com run through Cloudflare
    # TLS, so they are HTTPS-capable). No `preload` on purpose — preload bakes the
    # domain into browsers' hardcoded HTTPS list and is very hard to undo; it should
    # be a separate, deliberate submission to hstspreload.org, not bundled here.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Zero-risk hardening that belongs with HSTS on a static content site:
    add_header X-Content-Type-Options   "nosniff"                        always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # --- Sprach-Tausch: Englisch ist Standard und liegt auf der Wurzel ----------
    # Vorher: DE präfixlos auf der Wurzel, EN unter /en/. Jetzt umgekehrt.
    # Die alten /en/…-URLs sind indexiert und dürfen nicht ins 404 laufen — sie
    # zeigen auf exakt dieselbe (englische) Seite, die jetzt auf der Wurzel liegt,
    # also permanent umleiten und das Ranking mitnehmen.
    #   /en.html            -> /
    #   /en/schiffe/x.html  -> /schiffe/x.html
    # Die alten DEUTSCHEN URLs (/schiffe/x.html) werden NICHT umgeleitet: dort
    # liegt jetzt die englische Seite. Das ist die bewusste Konsequenz des
    # Tauschs; hreflang/x-default verweisen von dort auf /de/….
    location = /en.html { return 301 /; }
    location = /en      { return 301 /; }
    location /en/ {
        rewrite ^/en/(.*)$ /$1 permanent;
    }

    # Static multi-page site (Astro build.format:'file' → real .html files, plus
    # directory index.html for the onepagers). No SPA rewrite — mirror the existing
    # behaviour and fall through to a real 404.
    location / {
        try_files $uri $uri/ =404;
    }

    # Astro emits /404.html; serve it with a genuine 404 status (not 200).
    error_page 404 /404.html;
}
