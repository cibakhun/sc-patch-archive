# Builds the VerseBase rank/data bot as a Docker image and pushes it to ghcr.io.
# Coolify pulls the finished image. Only runs when bot-relevant files change.
name: Build & Push Bot Image

on:
  push:
    branches: [main]
    paths:
      - 'discord/bot/**'
      - 'src/data/**'
      - 'assets/manufacturers/**'
      - '.github/workflows/deploy-bot-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: bot-image-build
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: discord/bot/Dockerfile
          push: true
          tags: |
            ghcr.io/cibakhun/verse-base-rank-bot:latest
            ghcr.io/cibakhun/verse-base-rank-bot:${{ github.sha }}

      # Nudge Coolify to pull the new image. Uses a SEPARATE webhook for the bot
      # service (COOLIFY_BOT_DEPLOY_WEBHOOK) + the shared API token. If either is
      # unset, it just logs a hint — then click "Redeploy" in Coolify manually.
      - name: Trigger Coolify redeploy
        env:
          HOOK: ${{ secrets.COOLIFY_BOT_DEPLOY_WEBHOOK }}
          TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -n "$HOOK" ] && [ -n "$TOKEN" ]; then
            curl -fsSL "$HOOK" -H "Authorization: Bearer $TOKEN" && echo "Coolify bot redeploy triggered."
          else
            echo "COOLIFY_BOT_DEPLOY_WEBHOOK and/or COOLIFY_API_TOKEN not set — redeploy the bot manually in Coolify."
          fi
